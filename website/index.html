<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamy - AI阅读插件</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{height:100%}
  body{
    background:#000;color:#fff;
    font-family:'Roboto','Noto Sans SC',sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .page{
    position:relative;width:100%;max-width:1920px;margin:0 auto;
    overflow:hidden;
  }

  /* ===== Background photos ===== */
  .bg-photo{position:absolute;pointer-events:none;z-index:0}
  .bg-photo-1{left:0;top:0;width:355px;height:124px}
  .bg-photo-1 img{width:100%;height:100%;opacity:1;transform:rotate(10.38deg);object-fit:cover}
  .bg-photo-2{left:0;top:740px;width:165px;height:285px}
  .bg-photo-2 img{width:100%;height:100%;opacity:1;transform:rotate(16.24deg);object-fit:cover}
  .bg-photo-3{right:0;top:710px;width:189px;height:243px}
  .bg-photo-3 img{width:100%;height:100%;opacity:1;transform:rotate(-12.49deg);object-fit:cover}

  /* ===== Avatar ===== */
  .avatar-wrap{position:absolute;right:60px;top:73px;z-index:20}
  .avatar-btn{
    width:60px;height:60px;border-radius:50%;cursor:pointer;
    background:rgba(188,188,188,0.1);border:1.25px solid #454545;
    padding:0;position:relative;overflow:hidden;
    transition:opacity 0.2s ease,box-shadow 0.25s ease;
  }
  .avatar-btn:hover{box-shadow:0 0 14px 4px rgba(255,255,255,0.22);border-color:#a5a5a5}
  .avatar-btn img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
  .contact-card{
    position:absolute;right:-12px;top:72px;z-index:25;
    opacity:0;transform:translateY(-8px);pointer-events:none;
    transition:opacity 0.25s ease,transform 0.25s ease;
  }
  .contact-card.show{opacity:1;transform:translateY(0);pointer-events:auto}
  .contact-card img{width:212px;height:auto;display:block}

  /* ===== Hero layout ===== */
  .hero{
    position:relative;z-index:2;
    padding:243px 0 0 156px;
    height:890px;
  }
  .hero-left{
    position:relative;z-index:3;
    display:flex;flex-direction:column;align-items:flex-start;gap:66px;
    padding-top:30px;
  }
  .title{
    font-size:60px;font-weight:700;
    color:#fff;line-height:1.2;letter-spacing:-0.01em;
    font-family:'Roboto','Noto Sans SC',sans-serif;
  }
  .subtitle{
    font-size:18px;font-weight:400;
    color:rgba(255,255,255,0.8);
    line-height:1.6;
    max-width:538px;
  }

  /* Download button */
  .download-link{
    display:inline-flex;align-items:center;justify-content:center;
    text-decoration:none;
    padding:12px 46px;
    border:1.2px solid rgba(255,255,255,0.8);
    border-radius:59px;
    background:transparent;
    color:rgba(255,255,255,0.7);
    font-size:18px;font-weight:500;
    font-family:'Roboto','Noto Sans SC',sans-serif;
    cursor:pointer;
    transition:background 0.3s ease,border-color 0.3s ease,color 0.3s ease,box-shadow 0.35s ease;
    white-space:nowrap;
  }
  .download-link:hover{
    background:rgba(255,255,255,0.95);
    border-color:rgba(255,255,255,0.95);
    color:#000;
    box-shadow:0 8px 32px rgba(255,244,184,0.18);
  }

  /* ===== Cat visual ===== */
  .hero-visual{
    position:absolute;left:710px;top:139px;
    width:997px;height:656px;z-index:1;
  }
  .cat-base{
    position:absolute;right:101px;top:0;
    width:879px;height:620px;opacity:0.9;
  }
  .cat-base img{width:100%;height:100%;object-fit:contain}
  .cat-lit{
    position:absolute;right:101px;top:0;
    width:879px;height:620px;opacity:0;
    transition:opacity 0.8s ease;
  }
  .cat-lit.on{opacity:0.9}
  .cat-lit img{width:100%;height:100%;object-fit:contain}

  /* Lamp button */
  .lamp-btn{
    position:absolute;right:320px;top:58px;z-index:10;
    background:rgba(80,80,80,0.39);border:none;border-radius:100px;
    padding:10px 16px;
    color:rgba(255,255,255,0.6);font-size:12px;font-weight:400;
    font-family:'Roboto','Noto Sans SC',sans-serif;
    cursor:pointer;white-space:nowrap;
    animation:lamp-pulse 2.5s ease-in-out infinite;
    transition:transform 0.25s ease;
  }
  .lamp-btn:hover{transform:scale(1.06);color:rgba(255,255,255,0.85)}
  @keyframes lamp-pulse{0%,100%{opacity:0.6}50%{opacity:1}}

  /* ===== Feature cards ===== */
  .features{
    position:relative;z-index:3;
    display:flex;justify-content:center;gap:75px;
    padding:0 88px;
    margin-top:0;
    flex-wrap:nowrap;
  }
  .fc{
    width:292px;height:253px;flex-shrink:0;
    border:1px solid rgba(255,255,255,0.5);border-radius:24px;
    overflow:hidden;cursor:pointer;
    transition:transform 0.35s cubic-bezier(0.25,0.1,0.25,1),box-shadow 0.35s ease;
    position:relative;
  }
  .fc:hover{transform:translateY(-6px) scale(1.06);box-shadow:0 16px 48px rgba(255,244,184,0.15)}
  .fc-img{width:292px;height:162px;overflow:hidden;border-radius:22px 22px 0 0;position:relative}
  .fc-img img{width:292px;height:162px;object-fit:cover;display:block}
  .fc-text{
    width:292px;height:91px;
    display:flex;align-items:flex-start;
    padding:18px 14px 0;
    font-size:13px;font-weight:400;
    color:rgba(255,255,255,0.8);line-height:1.6;
    box-sizing:border-box;
  }

  /* ===== Cat scroll ===== */
  .cat-scroll-wrap{
    position:relative;z-index:3;
    height:116px;overflow:hidden;
    margin-top:216px;
  }
  .cat-scroll-track{
    display:flex;gap:140px;height:116px;align-items:center;
    opacity:0.7;
    animation:cats 30s linear infinite;
    width:max-content;
    padding-left:29px;
    will-change:transform;
  }
  @keyframes cats{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .cat-scroll-track img{height:116px;flex-shrink:0;object-fit:contain;display:block;width:auto}

  /* ===== Responsive ===== */
  @media(max-width:1600px){
    .hero{padding-left:156px}
    .features{gap:40px;padding:0 60px}
  }
  @media(max-width:1440px){
    .hero{padding-left:156px}
    .features{flex-wrap:wrap;justify-content:center;padding:0 48px;gap:30px}
  }
  @media(max-width:830px){
    .hero{
      padding:243px 0 0 60px;
      height:auto;
    }
    .features{flex-wrap:wrap;justify-content:flex-start;padding:0 60px;gap:30px}
  }
  @media(max-width:768px){
    .page{overflow-x:hidden}
    .hero{
      padding:120px 24px 0;
      flex-direction:column;
      height:auto;
      min-height:auto;
    }
    .hero-left{gap:32px;padding-top:0;align-items:center;text-align:center}
    .title{font-size:36px}
    .subtitle{font-size:14px;max-width:100%}
    .download-link{font-size:16px;padding:10px 32px}
    .features{flex-direction:column;align-items:center;padding:0 24px;gap:20px}
    .fc{width:292px;height:253px}
    .cat-scroll-wrap{margin-top:80px}
    .cat-scroll-track{gap:70px}
    .cat-scroll-track img{height:80px}
    .avatar-wrap{right:16px;top:16px}
    .avatar-btn{width:44px;height:44px}
  }
</style>
</head>
<body>

<div class="page">

  <div class="bg-photo bg-photo-1"><img src="背景图片1.png" alt=""></div>
  <div class="bg-photo bg-photo-2"><img src="背景图片2.png" alt=""></div>
  <div class="bg-photo bg-photo-3"><img src="背景图片3.png" alt=""></div>

  <div class="avatar-wrap" id="aw">
    <button class="avatar-btn" id="ab">
      <img src="右上角头像框.png" alt="">
    </button>
    <div class="contact-card" id="cc"><img src="联系方式.png" alt=""></div>
  </div>

  <div class="hero">
    <div class="hero-left">
      <h1 class="title">Dreamy</h1>
      <p class="subtitle">AI阅读插件，<br>将电子书中文本转换成画面，让阅读变得更沉浸</p>
      <a href="dreamy-extension.zip" download class="download-link">下载插件</a>
    </div>

    <div class="hero-visual">
      <div class="cat-base"><img src="猫咪看书图片.png" alt=""></div>
      <div class="cat-lit" id="catLit"><img src="猫咪看书-开灯.png" alt=""></div>
      <button class="lamp-btn" id="lb">帮猫猫开灯！</button>
    </div>
  </div>

  <div class="features">
    <div class="fc"><div class="fc-img"><img src="卡片1.png" alt=""></div><div class="fc-text">点击设置，填写API KEY</div></div>
    <div class="fc"><div class="fc-img"><img src="卡片2.png" alt=""></div><div class="fc-text">先分析书本，生图效果更还原</div></div>
    <div class="fc"><div class="fc-img"><img src="卡片3.png" alt=""></div><div class="fc-text">选中文本后，点击AI生图</div></div>
    <div class="fc"><div class="fc-img"><img src="卡片4.png" alt=""></div><div class="fc-text">生图弹窗可缩小，不影响继续阅读</div></div>
  </div>

  <div class="cat-scroll-wrap">
    <div class="cat-scroll-track" id="catTrack">
      <img src="底层猫咪滚动条.png" alt="">
    </div>
  </div>
</div>

<script>
(function(){
  /* Contact popup */
  var aw=document.getElementById('aw'),cc=document.getElementById('cc'),t;
  aw.addEventListener('mouseenter',function(){clearTimeout(t);cc.classList.add('show')});
  aw.addEventListener('mouseleave',function(){t=setTimeout(function(){cc.classList.remove('show')},200)});

  /* Lamp toggle */
  var lb=document.getElementById('lb'),cl=document.getElementById('catLit'),on=false;
  lb.addEventListener('click',function(){
    on=!on;
    if(on){cl.classList.add('on');lb.textContent='再次点击可关灯';lb.style.animation='none'}
    else{cl.classList.remove('on');lb.textContent='帮猫猫开灯！';lb.style.animation='lamp-pulse 2.5s ease-in-out infinite'}
  });

  /* Cat scroll loop */
  var ct=document.getElementById('catTrack');
  ct.innerHTML=ct.innerHTML+ct.innerHTML;

  /* Feature card reveal */
  var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)'}})},{threshold:0.1});
  document.querySelectorAll('.fc').forEach(function(c){c.style.opacity='0';c.style.transform='translateY(30px)';c.style.transition='opacity 0.6s ease, transform 0.6s ease';obs.observe(c)});
  setTimeout(function(){document.querySelectorAll('.fc').forEach(function(c){c.style.opacity='1';c.style.transform='translateY(0)'})},300);
})();
</script>
</body>
</html>
